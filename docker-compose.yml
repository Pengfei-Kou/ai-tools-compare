services:
  postgres:
    image: postgres:17-alpine
    container_name: aitc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aitc
      POSTGRES_PASSWORD: aitc_secret
      POSTGRES_DB: aitc_db
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - aitc-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitc -d aitc_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: aitc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://aitc:aitc_secret@postgres:5432/aitc_db
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change_me_in_production}
      ALLOWED_ORIGINS: https://ai-compare.duckdns.org
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_URL: https://ai-compare-api.duckdns.org/api/v1
    container_name: aitc-frontend
    restart: unless-stopped
    expose:
      - "4321"

volumes:
  aitc-pg-data:
